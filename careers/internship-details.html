<!DOCTYPE html>
<html>
<head>
  <title>Internship Details</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50">

<!-- HEADER -->
<header class="bg-indigo-600 text-white py-6 px-6">
  <h1 class="max-w-7xl mx-auto text-2xl font-bold">
    Internship Details
  </h1>
</header>

<section class="max-w-5xl mx-auto px-4 py-16">

  <!-- TITLE -->
  <div class="mb-10">
    <h2 id="roleTitle" class="text-3xl font-bold text-gray-900 mb-2">
      Internship Role
    </h2>
    <p class="text-gray-600">
      3-6 Months • Remote / Pune
    </p>
  </div>

  <!-- ABOUT -->
  <div class="mb-10">
    <h3 class="text-xl font-semibold mb-3">About the Role</h3>
    <p id="roleDesc" class="text-gray-600">
      Description will change dynamically.
    </p>
  </div>

  <!-- RESPONSIBILITIES -->
  <div class="mb-10">
    <h3 class="text-xl font-semibold mb-3">Responsibilities</h3>
    <ul id="roleResp" class="list-disc pl-5 text-gray-600 space-y-2"></ul>
  </div>

  <!-- APPLY -->
  <a href="./apply.html"
     class="bg-indigo-600 text-white px-6 py-3 rounded-lg hover:bg-indigo-700 transition">
    Apply Now
  </a>

</section>

<!-- SCRIPT -->
<script>
const params = new URLSearchParams(window.location.search);
const role = params.get("role");

const data = {
  frontend: {
    title: "Frontend Intern",
    desc: "Work on UI development using React and Tailwind.",
    resp: [
      "Build responsive UI",
      "Work with APIs",
      "Improve UX"
    ]
  },
  backend: {
    title: "Backend Intern",
    desc: "Develop APIs and handle server-side logic.",
    resp: [
      "Build APIs",
      "Work with databases",
      "Optimize performance"
    ]
  }
};

if(data[role]){
  document.getElementById("roleTitle").innerText = data[role].title;
  document.getElementById("roleDesc").innerText = data[role].desc;

  const list = document.getElementById("roleResp");
  data[role].resp.forEach(item => {
    const li = document.createElement("li");
    li.textContent = item;
    list.appendChild(li);
  });
}
</script>

</body>
</html>
